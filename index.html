<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BublEase 🌸</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>🌸 BubblEase... y date un respiro!</h1>
    </header>

    <main>
      <!-- Sección de introducción -->
      <section class="intro">
        <h2>Relájate y deja que tu mente sonría 😌</h2>
        <p>
          Elige tu microdescanso, desconecta un momento y disfruta de la calma
          con un toque divertido.
        </p>
      </section>

      <!-- Sección de opciones de tiempo -->
      <section class="options">
        <button class="time-btn">1 min</button>
        <button class="time-btn">3 min</button>
        <button class="time-btn">5 min</button>
      </section>

      <!-- Sección visual / animaciones -->
      <section class="visual">
        <div class="animation-area">
          <!-- Aquí pondremos animaciones suaves -->
          <div class="particle particle1"></div>
          <div class="particle particle2"></div>
          <div class="particle particle3"></div>
          <div class="motivational">Respira profundo y conecta contigo</div>
        </div>
      </section>

      <!-- Botón principal -->
      <section class="start">
        <button id="start-btn">Comenzar descanso</button>
      </section>

      <section class="music">
        <button id="spotify-btn">🎵 Escucha música en Spotify</button>
      </section>
    </main>

    <footer>
      <p>
        BubblEase © 2025 | Diseñado con calma y un toque divertido💜 por Ita
        Plata
      </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
